<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episodio Perdido - Sugerencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Lora&family=Rubik&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="misEstilos.css">
    <style>
        .banner-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 2rem;
        }
        .footer-custom {
            background-color: var(--antique-ruby);
            color: var(--desert-sand);
            padding: 2rem 0;
            margin-top: 3rem;
            font-family: 'Lora', serif;
        }
        .footer-custom a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }
        .footer-custom a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand brand-aesthetic" href="index.html" style="color: var(--antique-ruby); font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; font-family: 'Archivo Black', sans-serif;">✧ Episodio Perdido</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="catalogo.html">Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link active" href="sugerencias.html">Sugerencias</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <img src="img/banner.jpg" alt="Banner Sugerencias" class="banner-img shadow">
        
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-lg" style="background-color: var(--desert-sand); border: none; border-radius: 20px;">
                    <h2 class="text-center mb-4" style="color: var(--antique-ruby);">¡Sugiere un Anime!</h2>
                    <form id="formSugerencias">
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Tu Nombre</label>
                            <input type="text" class="form-control" id="nombre" placeholder="¿Cómo te llamas, beba?" required style="border: 2px solid var(--ceil);">
                        </div>
                        <div class="mb-3">
                            <label for="anime" class="form-label">Anime que sugieres</label>
                            <input type="text" class="form-control" id="anime" placeholder="Nombre completo del anime" required style="border: 2px solid var(--ceil);">
                        </div>
                        <div class="mb-3">
                            <label for="comentario" class="form-label">¿Por qué debemos verlo?</label>
                            <textarea class="form-control" id="comentario" rows="3" required style="border: 2px solid var(--ceil);"></textarea>
                        </div>
                        <button type="submit" class="btn btn-submit w-100" style="background-color: var(--chinese-blue); color: white; border: none; padding: 10px;">Enviar Solicitud</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-custom text-center">
        <div class="container">
            <p>&copy; 2026 Episodio Perdido. Creado con cariño por Jimenita.</p>
            <div class="social-links">
                <a href="#">Instagram</a>
                <a href="#">Twitter</a>
                <a href="#">TikTok</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const formulario = document.getElementById('formSugerencias');

        formulario.addEventListener('submit', async (e) => {
            e.preventDefault();

            const datos = {
                titulo: document.getElementById('anime').value,
                nombreUsuario: document.getElementById('nombre').value,
                descripcion: document.getElementById('comentario').value
            };

            try {
                // Aquí va tu link de Render
                const response = await fetch('https://episodio-perdido-backend.onrender.com/api/animes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                if (response.ok) {
                    alert("¡Súper beba! Sugerencia enviada a MongoDB ✨");
                    formulario.reset();
                } else {
                    alert("Algo salió mal, revisa el servidor.");
                }
            } catch (err) {
                alert("Error de conexión, bonita.");
            }
        });
    </script>
</body>
</html>
