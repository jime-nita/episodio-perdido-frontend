    <link rel="stylesheet" href="misEstilos.css">
</head>
<body class="matcha-background">
    
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand brand-aesthetic" href="index.html" style="color: #414B9E; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; font-family: 'Archivo Black', sans-serif;">✧ Episodio Perdido</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="catalogo.html">Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link" href="sugerencias.html">Sugerencias</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h2 class="text-center mb-5">Catálogo Completo</h2>

        <div class="row mb-5 justify-content-center">
            <div class="col-md-3 mb-3">
                <label class="form-label" style="color:#fff">Filtrar por Año</label>
                <select id="filterYear" class="form-select">
                    <option value="all">Todos</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label" style="color:#fff">Filtrar por Género</label>
                <select id="filterGenre" class="form-select">
                    <option value="all">Todos</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label" style="color:#fff">Filtrar por Estado</label>
                <select id="filterStatus" class="form-select">
                    <option value="all">Todos</option>
                    <option value="Terminado">Terminado</option>
                    <option value="En emisión">En emisión</option>
                </select>
            </div>
        </div>

        <div id="animeContainer" class="row row-cols-1 row-cols-md-3 g-4">
            </div>
